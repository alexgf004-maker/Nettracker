<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>NETTRACKER</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --green: #00ff88; --yellow: #ffb800; --red: #ff4444; --blue: #4488ff;
      --bg: #0a0a0a; --card: #111; --border: #1e1e1e;
      --text: #e0e0e0; --muted: #555;
      --font-mono: 'Share Tech Mono', monospace;
      --font-ui: 'Rajdhani', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-ui); min-height: 100vh; max-width: 480px; margin: 0 auto; }
    header { background: #0d0d0d; border-bottom: 1px solid #1a1a1a; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { font-family: var(--font-mono); font-size: 17px; color: #fff; letter-spacing: 3px; display: flex; align-items: center; gap: 8px; }
    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite; flex-shrink: 0; }
    .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 1px; font-family: var(--font-mono); margin-top: 2px; }
    @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 10px var(--green)} 50%{opacity:.4;box-shadow:0 0 3px var(--green)} }
    .back-btn { background: none; border: 1px solid #2a2a2a; color: #aaa; border-radius: 6px; width: 34px; height: 34px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #0d0d0d; border-top: 1px solid #1a1a1a; display: flex; z-index: 50; }
    .nav-btn { flex: 1; padding: 12px 4px 10px; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; background: none; border: none; transition: all .15s; }
    .nav-icon { font-size: 20px; }
    .nav-label { font-size: 8px; letter-spacing: 1px; color: var(--muted); font-family: var(--font-mono); }
    .nav-btn.active .nav-label { color: var(--green); }
    .btn { width: 100%; border: none; border-radius: 10px; padding: 13px; font-family: var(--font-ui); font-weight: 700; font-size: 13px; letter-spacing: 2px; cursor: pointer; margin-bottom: 8px; transition: all .15s; }
    .btn-primary { background: var(--green); color: #000; }
    .btn-primary:active { transform: scale(.97); }
    .btn-danger { background: #ff444418; color: var(--red); border: 1px solid #ff444433; }
    .btn-secondary { background: none; color: #888; border: 1px solid #2a2a2a; }
    .btn-small { background: var(--green); color: #000; border: none; border-radius: 8px; padding: 9px 16px; font-family: var(--font-ui); font-weight: 700; font-size: 11px; letter-spacing: 2px; cursor: pointer; white-space: nowrap; }
    .content { padding: 16px; padding-bottom: 80px; }
    .stats-bar { display: flex; gap: 8px; margin-bottom: 14px; }
    .stat-chip { flex: 1; background: var(--card); border: 1px solid #222; border-radius: 10px; padding: 8px 4px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all .15s; }
    .stat-chip.active { background: #161616; }
    .stat-num { font-size: 16px; font-weight: 700; font-family: var(--font-mono); }
    .stat-label { font-size: 8px; color: var(--muted); margin-top: 2px; letter-spacing: 1px; }
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 17px; color: var(--muted); }
    .search-input { width: 100%; background: var(--card); border: 1px solid #1e1e1e; border-radius: 10px; padding: 10px 10px 10px 36px; color: var(--text); font-family: var(--font-ui); font-size: 14px; outline: none; }
    .list { display: flex; flex-direction: column; gap: 10px; }
    .card { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--green); border-radius: 12px; padding: 14px; cursor: pointer; transition: all .15s; }
    .card:active { transform: translateX(3px); background: #161616; }
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .card-serie { font-family: var(--font-mono); font-size: 15px; color: #fff; letter-spacing: 1px; }
    .badge { font-size: 9px; font-weight: 700; letter-spacing: 1px; padding: 3px 9px; border-radius: 20px; font-family: var(--font-mono); }
    .card-sub { font-size: 12px; color: #777; margin-bottom: 4px; font-family: var(--font-mono); }
    .card-lugar { font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .card-date { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
    .days-tag { font-size: 11px; font-weight: 700; font-family: var(--font-mono); }
    .empty { text-align: center; padding: 70px 20px; }
    .empty-icon { font-size: 52px; opacity: .3; margin-bottom: 14px; }
    .empty-text { color: var(--muted); font-size: 14px; letter-spacing: 1px; margin-bottom: 20px; }
    .form-title { font-size: 11px; letter-spacing: 3px; color: var(--muted); margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; font-family: var(--font-mono); }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 9px; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px; font-family: var(--font-mono); }
    input, textarea { width: 100%; background: var(--card); border: 1px solid #222; border-radius: 10px; padding: 11px 13px; color: var(--text); font-family: var(--font-ui); font-size: 14px; outline: none; transition: border-color .15s; }
    input:focus, textarea:focus { border-color: #333; }
    textarea { min-height: 80px; resize: vertical; }
    input[type=date]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: .4; }
    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }
    .gps-btn { margin-top: 8px; background: none; border: 1px solid #2a2a2a; border-radius: 8px; color: var(--green); font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; padding: 9px 12px; cursor: pointer; width: 100%; transition: all .15s; }
    .gps-tag { margin-top: 6px; font-size: 10px; color: #00ff8877; font-family: var(--font-mono); }
    .equipo-preview { background: #0d1a12; border: 1px solid #00ff8833; border-radius: 10px; padding: 12px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
    .equipo-preview-serie { font-family: var(--font-mono); font-size: 14px; color: var(--green); }
    .equipo-preview-modelo { font-size: 12px; color: #aaa; margin-top: 2px; }
    .change-btn { font-size: 10px; color: var(--green); background: none; border: 1px solid #00ff8833; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-family: var(--font-mono); white-space: nowrap; }
    .detail-header { border-bottom: 2px solid var(--green); padding-bottom: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: flex-start; }
    .detail-serie { font-family: var(--font-mono); font-size: 22px; color: #fff; letter-spacing: 2px; }
    .detail-grid { margin-bottom: 16px; }
    .detail-row { display: flex; border-bottom: 1px solid #161616; padding: 10px 0; }
    .detail-label { width: 42%; font-size: 9px; letter-spacing: 1px; color: var(--muted); padding-top: 2px; flex-shrink: 0; font-family: var(--font-mono); }
    .detail-value { font-size: 14px; color: #ddd; flex: 1; }
    .map-link { display: block; text-align: center; color: var(--green); font-size: 11px; letter-spacing: 2px; text-decoration: none; border: 1px solid #00ff8822; border-radius: 10px; padding: 11px; margin-bottom: 16px; font-family: var(--font-mono); }
    .alert-banner { border-radius: 10px; padding: 11px 14px; font-size: 12px; letter-spacing: .5px; margin-bottom: 16px; font-weight: 700; font-family: var(--font-mono); }
    .alert-yellow { background: #ffb80018; border: 1px solid #ffb80033; color: var(--yellow); }
    .alert-red { background: #ff444418; border: 1px solid #ff444433; color: var(--red); }
    .section-title { font-family: var(--font-mono); font-size: 10px; letter-spacing: 3px; color: var(--muted); margin-bottom: 12px; margin-top: 4px; }
    .selector-modal { position: fixed; inset: 0; background: #000000ee; z-index: 200; display: flex; flex-direction: column; }
    .selector-header { background: #111; border-bottom: 1px solid #222; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .selector-title { font-family: var(--font-mono); font-size: 13px; color: #fff; letter-spacing: 2px; }
    .selector-close { background: none; border: 1px solid #333; color: #aaa; border-radius: 6px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; }
    .selector-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .selector-item { background: #151515; border: 1px solid #222; border-radius: 10px; padding: 14px; cursor: pointer; transition: all .15s; display: flex; justify-content: space-between; align-items: center; }
    .selector-item:active { background: #1e1e1e; }
    .selector-item.disabled { opacity: .4; pointer-events: none; }
    .selector-serie { font-family: var(--font-mono); font-size: 14px; color: #fff; }
    .selector-modelo { font-size: 12px; color: #777; margin-top: 2px; }
    .toast { position: fixed; top: 68px; left: 50%; transform: translateX(-50%); background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 13px; z-index: 300; box-shadow: 0 4px 24px #00000099; max-width: 90%; text-align: center; font-family: var(--font-ui); animation: fadeIn .2s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateX(-50%) translateY(-8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    .modal-overlay { position: fixed; inset: 0; background: #000000cc; z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: #151515; border: 1px solid #2a2a2a; border-radius: 14px; padding: 24px; width: 100%; max-width: 340px; }
    .modal-title { font-size: 14px; font-weight: 700; letter-spacing: 3px; color: #fff; margin-bottom: 10px; font-family: var(--font-mono); }
    .modal-text { font-size: 14px; color: #aaa; margin-bottom: 20px; line-height: 1.5; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; }
    .spinner { width: 36px; height: 36px; border: 2px solid #222; border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: var(--font-mono); font-size: 12px; color: var(--muted); letter-spacing: 2px; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); display: inline-block; margin-left: 6px; }
    .sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
  </style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><div class="loading-text">CONECTANDO...</div></div></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDmwLWle24Nldh-Y6YBmYLaaDA6ZTpuKuc",
  authDomain: "pqfind.firebaseapp.com",
  databaseURL: "https://pqfind-default-rtdb.firebaseio.com",
  projectId: "pqfind",
  storageBucket: "pqfind.firebasestorage.app",
  messagingSenderId: "666556457981",
  appId: "1:666556457981:web:2d3dfbecfd3e515387ef94"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
const deploysRef = ref(db, 'analizadores');
const equiposRef = ref(db, 'equipos');

let records = [], equipos = [];
let tab = 'despliegues', view = 'lista';
let form = emptyForm(), equipoForm = emptyEquipoForm();
let editId = null, editEquipoId = null;
let filterStatus = 'TODOS', search = '';
let confirmRetiroId = null, syncing = false, showSelector = false;
let deploysLoaded = false, equiposLoaded = false;

function emptyForm() { return { equipoId:null, serie:'', modelo:'', caso:'', lugar:'', lat:null, lng:null, fechaInstalacion:today(), fechaRetiro:'', notas:'' }; }
function emptyEquipoForm() { return { serie:'', modelo:'', notas:'' }; }
function today() { return new Date().toISOString().split('T')[0]; }
function formatDate(d) { if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
function daysUntil(d) { const n=new Date(); n.setHours(0,0,0,0); const r=new Date(d); r.setHours(0,0,0,0); return Math.round((r-n)/86400000); }
function calcStatus(r) { if(r.retirado) return 'RETIRADO'; const d=daysUntil(r.fechaRetiro); return d<=3?'PROXIMO':'ACTIVO'; }
const SC = { ACTIVO:'#00ff88', PROXIMO:'#ffb800', RETIRADO:'#555' };
const SL = { ACTIVO:'Activo', PROXIMO:'Próximo retiro', RETIRADO:'Retirado' };
function eqStatus(eq) { return records.find(r=>r.equipoId===eq.id&&!r.retirado)?'desplegado':'disponible'; }
function eqColor(eq) { return eqStatus(eq)==='desplegado'?'#ffb800':'#00ff88'; }
function eqLabel(eq) { return eqStatus(eq)==='desplegado'?'Desplegado':'Disponible'; }

onValue(deploysRef, snap => {
  records=[];
  snap.forEach(c=>records.push({id:c.key,...c.val()}));
  records.sort((a,b)=>(b.fechaRegistro||'').localeCompare(a.fechaRegistro||''));
  deploysLoaded=true; if(equiposLoaded){render();checkReminders();}
});
onValue(equiposRef, snap => {
  equipos=[];
  snap.forEach(c=>equipos.push({id:c.key,...c.val()}));
  equipos.sort((a,b)=>(a.serie||'').localeCompare(b.serie||''));
  equiposLoaded=true; if(deploysLoaded) render();
});

let reminderShown=false;
function checkReminders() {
  if(reminderShown) return;
  const h=today(), p=records.filter(r=>!r.retirado&&r.fechaRetiro===h);
  if(p.length>0){reminderShown=true;showToast(`🔔 HOY: ${p.length} analizador${p.length>1?'es':''} para retiro`);}
}

let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg; t.style.display='block';
  toastTimer=setTimeout(()=>{if(t)t.style.display='none';},3500);
}

function getGPS() {
  if(!navigator.geolocation) return showToast('GPS no disponible');
  const btn=document.getElementById('gps-btn');
  if(btn) btn.textContent='⏳ Obteniendo GPS...';
  navigator.geolocation.getCurrentPosition(pos=>{
    form.lat=pos.coords.latitude.toFixed(6); form.lng=pos.coords.longitude.toFixed(6);
    if(!form.lugar) form.lugar=`${(+form.lat).toFixed(4)}, ${(+form.lng).toFixed(4)}`;
    render(); showToast('📍 Ubicación capturada');
  },()=>{showToast('No se pudo obtener ubicación');render();},{enableHighAccuracy:true,timeout:10000});
}

function handleSave() {
  if(!form.equipoId) return showToast('Selecciona un equipo del inventario');
  if(!form.caso.trim()) return showToast('Ingresa el código de caso/campaña');
  if(!form.fechaRetiro) return showToast('Ingresa la fecha de retiro');
  syncing=true; render();
  const payload={...form, retirado:false, fechaRegistro:today()};
  if(editId) {
    update(ref(db,`analizadores/${editId}`),form).then(()=>{syncing=false;showToast('✅ Actualizado');view='lista';editId=null;form=emptyForm();render();});
  } else {
    push(deploysRef,payload).then(()=>{syncing=false;showToast('✅ Despliegue registrado');view='lista';form=emptyForm();render();});
  }
}

function handleRetiro(id) {
  update(ref(db,`analizadores/${id}`),{retirado:true,fechaRetiroReal:today()}).then(()=>{
    showToast('🔌 Marcado como retirado'); confirmRetiroId=null; view='lista'; render();
  });
}

function handleDeleteDeploy(id) {
  if(!confirm('¿Eliminar este despliegue?')) return;
  remove(ref(db,`analizadores/${id}`)).then(()=>{showToast('🗑 Eliminado');view='lista';render();});
}

function handleSaveEquipo() {
  if(!equipoForm.serie.trim()) return showToast('Ingresa el número de serie');
  if(!equipoForm.modelo.trim()) return showToast('Ingresa el modelo/marca');
  syncing=true; render();
  if(editEquipoId) {
    update(ref(db,`equipos/${editEquipoId}`),equipoForm).then(()=>{syncing=false;showToast('✅ Equipo actualizado');view='lista';editEquipoId=null;equipoForm=emptyEquipoForm();render();});
  } else {
    push(equiposRef,{...equipoForm,fechaRegistro:today()}).then(()=>{syncing=false;showToast('✅ Equipo agregado');view='lista';equipoForm=emptyEquipoForm();render();});
  }
}

function handleDeleteEquipo(id) {
  if(records.find(r=>r.equipoId===id&&!r.retirado)) return showToast('⚠️ Equipo desplegado, retíralo primero');
  if(!confirm('¿Eliminar del inventario?')) return;
  remove(ref(db,`equipos/${id}`)).then(()=>{showToast('🗑 Equipo eliminado');view='lista';render();});
}

function render() {
  const el=document.getElementById('app'); if(!el) return;
  const counts={TODOS:records.length,ACTIVO:records.filter(r=>calcStatus(r)==='ACTIVO').length,PROXIMO:records.filter(r=>calcStatus(r)==='PROXIMO').length,RETIRADO:records.filter(r=>r.retirado).length};
  let html='';
  const showBack = view!=='lista';

  html+=`<header>
    <div class="header-left">
      ${showBack?`<button class="back-btn" onclick="goBack()">←</button>`:''}
      <div>
        <div class="logo"><span class="pulse-dot"></span>NETTRACKER<span class="sync-dot ${syncing?'syncing':''}"></span></div>
        <div class="logo-sub">Analizadores de Red</div>
      </div>
    </div>
    ${view==='lista'&&tab==='despliegues'?`<button class="btn-small" onclick="newDeploy()">+ NUEVO</button>`:''}
    ${view==='lista'&&tab==='inventario'?`<button class="btn-small" onclick="newEquipo()">+ EQUIPO</button>`:''}
  </header>`;

  if(confirmRetiroId) {
    html+=`<div class="modal-overlay"><div class="modal">
      <div class="modal-title">CONFIRMAR RETIRO</div>
      <div class="modal-text">¿Confirmas que el analizador fue desinstalado hoy?</div>
      <button class="btn btn-danger" onclick="doRetiro('${confirmRetiroId}')">SÍ, FUE RETIRADO</button>
      <button class="btn btn-secondary" onclick="cancelRetiro()">CANCELAR</button>
    </div></div>`;
  }

  if(showSelector) {
    html+=`<div class="selector-modal">
      <div class="selector-header">
        <div class="selector-title">ELEGIR EQUIPO</div>
        <button class="selector-close" onclick="closeSelector()">✕</button>
      </div>
      <div class="selector-list">
        ${equipos.length===0?`<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Sin equipos en inventario</div></div>`:''}
        ${equipos.map(eq=>{
          const avail=eqStatus(eq)==='disponible';
          return `<div class="selector-item ${!avail?'disabled':''}" onclick="${avail?`pickEquipo('${eq.id}')`:''}" >
            <div>
              <div class="selector-serie">${eq.serie}</div>
              <div class="selector-modelo">${eq.modelo}${!avail?' · <span style="color:var(--yellow)">En uso</span>':''}</div>
            </div>
            ${avail?`<span style="color:var(--green);font-family:var(--font-mono);font-size:11px">ELEGIR →</span>`:`<span style="color:var(--muted);font-size:11px">EN USO</span>`}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  if(tab==='despliegues') {
    if(view==='lista') {
      const filtered=records.filter(r=>{
        const st=calcStatus(r);
        if(filterStatus!=='TODOS'&&st!==filterStatus) return false;
        if(search){const q=search.toLowerCase();return r.serie.toLowerCase().includes(q)||r.caso.toLowerCase().includes(q)||(r.lugar||'').toLowerCase().includes(q);}
        return true;
      });
      html+=`<div class="content">
        <div class="stats-bar">
          ${['TODOS','ACTIVO','PROXIMO','RETIRADO'].map(s=>`
            <div class="stat-chip ${filterStatus===s?'active':''}" onclick="setFilter('${s}')" style="border-color:${s==='TODOS'?'#333':SC[s]+'44'}">
              <span class="stat-num" style="color:${s==='TODOS'?'#fff':SC[s]}">${counts[s]}</span>
              <span class="stat-label">${s==='TODOS'?'TOTAL':s==='PROXIMO'?'PRÓX.':s}</span>
            </div>`).join('')}
        </div>
        <div class="search-wrap"><span class="search-icon">⌕</span>
          <input class="search-input" placeholder="Buscar serie, caso, lugar..." value="${search}" oninput="setSearch(this.value)">
        </div>`;
      if(filtered.length===0){
        html+=`<div class="empty"><div class="empty-icon">📡</div>
          <div class="empty-text">${records.length===0?'Sin despliegues registrados':'Sin resultados'}</div>
          ${records.length===0?`<button class="btn btn-primary" style="max-width:260px;margin:0 auto" onclick="newDeploy()">+ REGISTRAR DESPLIEGUE</button>`:''}
        </div>`;
      } else {
        html+=`<div class="list">`;
        filtered.forEach(r=>{
          const st=calcStatus(r), dias=!r.retirado?daysUntil(r.fechaRetiro):null;
          const dc=dias===null?'':dias<=0?'color:var(--red)':dias<=3?'color:var(--yellow)':'color:var(--muted)';
          const dt=dias===null?'':dias===0?'🔔 HOY':dias<0?`${Math.abs(dias)}d vencido`:`en ${dias}d`;
          html+=`<div class="card" style="border-left-color:${SC[st]};opacity:${st==='RETIRADO'?.6:1}" onclick="openDetail('${r.id}')">
            <div class="card-top"><div class="card-serie">${r.serie||'—'}</div>
              <div class="badge" style="background:${SC[st]}18;color:${SC[st]};border:1px solid ${SC[st]}33">${SL[st]}</div>
            </div>
            <div class="card-sub">${r.modelo?r.modelo+' · ':''} #${r.caso}</div>
            <div class="card-lugar">📍 ${r.lugar||'Sin ubicación'}</div>
            <div class="card-footer"><span class="card-date">Retiro: ${formatDate(r.fechaRetiro)}</span><span class="days-tag" style="${dc}">${dt}</span></div>
          </div>`;
        });
        html+=`</div>`;
      }
      html+=`</div>`;
    }
    else if(view==='form') {
      const selEq=form.equipoId?equipos.find(e=>e.id===form.equipoId):null;
      html+=`<div class="content">
        <div class="form-title">${editId?'EDITAR DESPLIEGUE':'NUEVO DESPLIEGUE'}</div>
        <div class="field"><label>EQUIPO *</label>
          ${selEq?`<div class="equipo-preview">
            <div><div class="equipo-preview-serie">${selEq.serie}</div><div class="equipo-preview-modelo">${selEq.modelo}</div></div>
            <button class="change-btn" onclick="openSelector()">CAMBIAR</button>
          </div>`:`<button class="btn btn-secondary" style="border-color:#00ff8833;color:var(--green)" onclick="openSelector()">📦 ELEGIR DEL INVENTARIO</button>`}
        </div>
        <div class="field"><label>CÓDIGO DE CASO / CAMPAÑA *</label>
          <input placeholder="Ej: CAMP-456 / CASO-789" value="${form.caso}" oninput="setField('caso',this.value)">
        </div>
        <div class="field"><label>LUGAR / DESCRIPCIÓN</label>
          <input placeholder="Ej: Edificio Central, Piso 3" value="${form.lugar}" oninput="setField('lugar',this.value)">
          <button class="gps-btn" id="gps-btn" onclick="triggerGPS()">📍 CAPTURAR UBICACIÓN GPS</button>
          ${form.lat?`<div class="gps-tag">🛰 ${form.lat}, ${form.lng}</div>`:''}
        </div>
        <div class="row">
          <div class="field"><label>FECHA INSTALACIÓN</label><input type="date" value="${form.fechaInstalacion}" oninput="setField('fechaInstalacion',this.value)"></div>
          <div class="field"><label>FECHA RETIRO *</label><input type="date" value="${form.fechaRetiro}" oninput="setField('fechaRetiro',this.value)"></div>
        </div>
        <div class="field"><label>NOTAS ADICIONALES</label>
          <textarea placeholder="Observaciones, acceso, contacto..." oninput="setField('notas',this.value)">${form.notas}</textarea>
        </div>
        <button class="btn btn-primary" onclick="saveDeploy()">${editId?'GUARDAR CAMBIOS':'REGISTRAR DESPLIEGUE'}</button>
      </div>`;
    }
    else if(view==='detalle') {
      const r=records.find(x=>x.id===editId); if(!r){view='lista';return render();}
      const st=calcStatus(r), dias=!r.retirado?daysUntil(r.fechaRetiro):null;
      html+=`<div class="content">
        <div class="detail-header" style="border-color:${SC[st]}">
          <div><div class="detail-serie">${r.serie||'—'}</div><div style="font-size:12px;color:#777;margin-top:3px;font-family:var(--font-mono)">${r.modelo||''}</div></div>
          <div class="badge" style="background:${SC[st]}18;color:${SC[st]};border:1px solid ${SC[st]}33;font-size:11px">${SL[st]}</div>
        </div>
        ${dias===0&&!r.retirado?`<div class="alert-banner alert-yellow">🔔 RECORDATORIO: Este analizador debe retirarse HOY</div>`:''}
        ${dias!==null&&dias<0?`<div class="alert-banner alert-red">⚠️ VENCIDO: Debió retirarse hace ${Math.abs(dias)} día${Math.abs(dias)>1?'s':''}</div>`:''}
        <div class="detail-grid">
          <div class="detail-row"><div class="detail-label">Caso / Campaña</div><div class="detail-value">#${r.caso}</div></div>
          <div class="detail-row"><div class="detail-label">Lugar</div><div class="detail-value">${r.lugar||'Sin descripción'}</div></div>
          ${r.lat?`<div class="detail-row"><div class="detail-label">GPS</div><div class="detail-value">${r.lat}, ${r.lng}</div></div>`:''}
          <div class="detail-row"><div class="detail-label">Instalación</div><div class="detail-value">${formatDate(r.fechaInstalacion)}</div></div>
          <div class="detail-row"><div class="detail-label">Retiro programado</div><div class="detail-value">${formatDate(r.fechaRetiro)}${dias!==null?` (${dias===0?'HOY':dias>0?`en ${dias}d`:`${Math.abs(dias)}d vencido`})`:''}</div></div>
          ${r.fechaRetiroReal?`<div class="detail-row"><div class="detail-label">Retirado el</div><div class="detail-value">${formatDate(r.fechaRetiroReal)}</div></div>`:''}
          ${r.notas?`<div class="detail-row"><div class="detail-label">Notas</div><div class="detail-value">${r.notas}</div></div>`:''}
          <div class="detail-row"><div class="detail-label">Registrado</div><div class="detail-value">${formatDate(r.fechaRegistro)}</div></div>
        </div>
        ${r.lat?`<a class="map-link" href="https://maps.google.com/?q=${r.lat},${r.lng}" target="_blank">🗺 VER EN GOOGLE MAPS</a>`:''}
        ${!r.retirado?`<button class="btn btn-primary" onclick="editDeploy('${r.id}')">EDITAR</button><button class="btn btn-danger" onclick="askRetiro('${r.id}')">MARCAR COMO RETIRADO</button>`:''}
        <button class="btn btn-secondary" style="color:var(--red);border-color:#ff444433" onclick="deleteDeploy('${r.id}')">ELIMINAR REGISTRO</button>
      </div>`;
    }
  }

  else if(tab==='inventario') {
    if(view==='lista') {
      const disp=equipos.filter(e=>eqStatus(e)==='disponible').length;
      const desp=equipos.filter(e=>eqStatus(e)==='desplegado').length;
      html+=`<div class="content">
        <div class="stats-bar">
          <div class="stat-chip active" style="border-color:#4488ff44"><span class="stat-num" style="color:#4488ff">${equipos.length}</span><span class="stat-label">TOTAL</span></div>
          <div class="stat-chip" style="border-color:#00ff8844"><span class="stat-num" style="color:var(--green)">${disp}</span><span class="stat-label">DISPONIBLES</span></div>
          <div class="stat-chip" style="border-color:#ffb80044"><span class="stat-num" style="color:var(--yellow)">${desp}</span><span class="stat-label">DESPLEGADOS</span></div>
        </div>`;
      if(equipos.length===0){
        html+=`<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">Sin equipos en inventario</div>
          <button class="btn btn-primary" style="max-width:260px;margin:0 auto" onclick="newEquipo()">+ AGREGAR PRIMER EQUIPO</button></div>`;
      } else {
        html+=`<div class="list">`;
        equipos.forEach(eq=>{
          const c=eqColor(eq), l=eqLabel(eq), st=eqStatus(eq);
          const dep=records.find(r=>r.equipoId===eq.id&&!r.retirado);
          html+=`<div class="card" style="border-left-color:${c}" onclick="openEquipoDetalle('${eq.id}')">
            <div class="card-top"><div class="card-serie">${eq.serie}</div>
              <div class="badge" style="background:${c}18;color:${c};border:1px solid ${c}33">${l}</div>
            </div>
            <div class="card-sub">${eq.modelo||'Sin modelo'}</div>
            ${dep?`<div style="font-size:11px;color:var(--yellow);margin-top:2px">📡 Caso: #${dep.caso}${dep.lugar?' · '+dep.lugar:''}</div>`:''}
          </div>`;
        });
        html+=`</div>`;
      }
      html+=`</div>`;
    }
    else if(view==='equipo_form') {
      html+=`<div class="content">
        <div class="form-title">${editEquipoId?'EDITAR EQUIPO':'AGREGAR EQUIPO'}</div>
        <div class="field"><label>NÚMERO DE SERIE *</label>
          <input placeholder="Ej: ANZ-2024-001" value="${equipoForm.serie}" oninput="setEF('serie',this.value)">
        </div>
        <div class="field"><label>MODELO / MARCA *</label>
          <input placeholder="Ej: Fluke 1760 / Hioki PQ3198" value="${equipoForm.modelo}" oninput="setEF('modelo',this.value)">
        </div>
        <div class="field"><label>NOTAS</label>
          <textarea placeholder="Observaciones del equipo..." oninput="setEF('notas',this.value)">${equipoForm.notas}</textarea>
        </div>
        <button class="btn btn-primary" onclick="saveEquipo()">${editEquipoId?'GUARDAR CAMBIOS':'AGREGAR AL INVENTARIO'}</button>
      </div>`;
    }
    else if(view==='equipo_detalle') {
      const eq=equipos.find(x=>x.id===editEquipoId); if(!eq){view='lista';return render();}
      const c=eqColor(eq), l=eqLabel(eq);
      const historial=records.filter(r=>r.equipoId===eq.id);
      html+=`<div class="content">
        <div class="detail-header" style="border-color:${c}">
          <div class="detail-serie">${eq.serie}</div>
          <div class="badge" style="background:${c}18;color:${c};border:1px solid ${c}33;font-size:11px">${l}</div>
        </div>
        <div class="detail-grid">
          <div class="detail-row"><div class="detail-label">Modelo / Marca</div><div class="detail-value">${eq.modelo||'—'}</div></div>
          ${eq.notas?`<div class="detail-row"><div class="detail-label">Notas</div><div class="detail-value">${eq.notas}</div></div>`:''}
          <div class="detail-row"><div class="detail-label">Registrado</div><div class="detail-value">${formatDate(eq.fechaRegistro)}</div></div>
          <div class="detail-row"><div class="detail-label">Despliegues</div><div class="detail-value">${historial.length} total</div></div>
        </div>
        ${historial.length>0?`<div class="section-title">HISTORIAL DE DESPLIEGUES</div><div class="list" style="margin-bottom:16px">
          ${historial.map(r=>{const st2=calcStatus(r);return `<div class="card" style="border-left-color:${SC[st2]};opacity:${r.retirado?.7:1};cursor:default;padding:10px 14px">
            <div class="card-top"><div style="font-size:12px;font-family:var(--font-mono);color:#aaa">#${r.caso}</div>
              <div class="badge" style="background:${SC[st2]}18;color:${SC[st2]};border:1px solid ${SC[st2]}33">${SL[st2]}</div>
            </div>
            <div style="font-size:11px;color:#666;font-family:var(--font-mono)">${formatDate(r.fechaInstalacion)} → ${formatDate(r.fechaRetiro)}</div>
          </div>`;}).join('')}
        </div>`:''}
        <button class="btn btn-primary" onclick="editEquipo('${eq.id}')">EDITAR</button>
        <button class="btn btn-secondary" style="color:var(--red);border-color:#ff444433" onclick="deleteEquipo('${eq.id}')">ELIMINAR DEL INVENTARIO</button>
      </div>`;
    }
  }

  html+=`<nav class="bottom-nav">
    <button class="nav-btn ${tab==='despliegues'?'active':''}" onclick="switchTab('despliegues')"><span class="nav-icon">📡</span><span class="nav-label">DESPLIEGUES</span></button>
    <button class="nav-btn ${tab==='inventario'?'active':''}" onclick="switchTab('inventario')"><span class="nav-icon">📦</span><span class="nav-label">INVENTARIO</span></button>
  </nav>`;

  el.innerHTML=html;
}

window.goBack=()=>{view='lista';editId=null;editEquipoId=null;form=emptyForm();equipoForm=emptyEquipoForm();showSelector=false;render();};
window.switchTab=(t)=>{tab=t;view='lista';editId=null;editEquipoId=null;form=emptyForm();render();};
window.setFilter=(f)=>{filterStatus=f;render();};
window.setSearch=(v)=>{search=v;render();};
window.setField=(k,v)=>{form[k]=v;};
window.setEF=(k,v)=>{equipoForm[k]=v;};
window.triggerGPS=getGPS;
window.newDeploy=()=>{
  if(equipos.filter(e=>eqStatus(e)==='disponible').length===0) return showToast('⚠️ No hay equipos disponibles en inventario');
  form=emptyForm();editId=null;view='form';render();
};
window.saveDeploy=handleSave;
window.openDetail=(id)=>{editId=id;view='detalle';render();};
window.editDeploy=(id)=>{const r=records.find(x=>x.id===id);if(!r)return;form={equipoId:r.equipoId,serie:r.serie,modelo:r.modelo||'',caso:r.caso,lugar:r.lugar||'',lat:r.lat||null,lng:r.lng||null,fechaInstalacion:r.fechaInstalacion,fechaRetiro:r.fechaRetiro,notas:r.notas||''};editId=id;view='form';render();};
window.askRetiro=(id)=>{confirmRetiroId=id;render();};
window.cancelRetiro=()=>{confirmRetiroId=null;render();};
window.doRetiro=handleRetiro;
window.deleteDeploy=handleDeleteDeploy;
window.newEquipo=()=>{equipoForm=emptyEquipoForm();editEquipoId=null;view='equipo_form';render();};
window.saveEquipo=handleSaveEquipo;
window.openEquipoDetalle=(id)=>{editEquipoId=id;view='equipo_detalle';render();};
window.editEquipo=(id)=>{const eq=equipos.find(x=>x.id===id);if(!eq)return;equipoForm={serie:eq.serie,modelo:eq.modelo||'',notas:eq.notas||''};editEquipoId=id;view='equipo_form';render();};
window.deleteEquipo=handleDeleteEquipo;
window.openSelector=()=>{showSelector=true;render();};
window.closeSelector=()=>{showSelector=false;render();};
window.pickEquipo=(id)=>{const eq=equipos.find(x=>x.id===id);if(!eq)return;form.equipoId=id;form.serie=eq.serie;form.modelo=eq.modelo||'';showSelector=false;render();};
</script>
</body>
</html>
